spring:
  application:
    name: quiz-platform-api

  datasource:
    url: jdbc:postgresql://localhost:5432/quiz_platform
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  jackson:
    default-property-inclusion: NON_NULL
    property-naming-strategy: LOWER_CAMEL_CASE

  security:
    oauth2:
      resourceserver:
        jwt:
          # Entra ID v2 issuer URL — requires `accessTokenAcceptedVersion: 2` in the
          # API app registration manifest. v2 access tokens carry `iss` =
          # `https://login.microsoftonline.com/{tid}/v2.0` and `aud` = bare client
          # GUID (no `api://` prefix).
          issuer-uri: https://login.microsoftonline.com/${quizplatform.azure-ad.tenant-id}/v2.0
          # The audience the API was registered as. Used to validate the `aud` claim.
          audiences:
            - ${quizplatform.azure-ad.audience}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

quizplatform:
  azure-ad:
    # Set these in application-local.yml or via env vars.
    # SPRING_APPLICATION_NAME-style env mapping: QUIZPLATFORM_AZURE_AD_TENANT_ID
    tenant-id: REPLACE_WITH_TENANT_ID
    audience: REPLACE_WITH_API_CLIENT_ID_GUID
  cors:
    allowed-origins:
      - http://localhost:5173
  platform:
    public-url: http://localhost:5173

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
